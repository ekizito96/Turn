name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: turn
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: turn
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: turn
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: turn.exe
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}
        working-directory: impl

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: turn-${{ matrix.target }}
          path: impl/target/${{ matrix.target }}/release/${{ matrix.artifact }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            name=$(basename "$dir")
            if [[ -f "$dir/turn.exe" ]]; then
              cp "$dir/turn.exe" "release/turn-$name.exe"
            elif [[ -f "$dir/turn" ]]; then
              cp "$dir/turn" "release/turn-$name"
            fi
          done
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
